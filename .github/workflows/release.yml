---
name: Release

"on":
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Verify signed annotated tag and Cargo version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "guard") | .version')
          test "$RELEASE_TAG" = "v${version}" || {
            echo "release tag does not match Cargo package version v${version}"
            exit 1
          }
          tag_ref=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}")
          test "$(jq -r '.object.type' <<< "$tag_ref")" = tag || {
            echo "release ref is not an annotated tag"
            exit 1
          }
          tag_sha=$(jq -r '.object.sha' <<< "$tag_ref")
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.verification.verified')" = true || {
            echo "release tag signature is not verified"
            exit 1
          }
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Run tests
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: guard
            asset_name: guard-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: guard
            asset_name: guard-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: guard.exe
            asset_name: guard-${{ github.ref_name }}-x86_64-pc-windows-msvc.tar.gz
          # - target: x86_64-apple-darwin
          #   os: macos-latest
          #   artifact_name: guard
          #   asset_name: guard-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          # - target: aarch64-apple-darwin
          #   os: macos-latest
          #   artifact_name: guard
          #   asset_name: guard-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build binary (Native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build binary (Cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary
        shell: bash
        run: strip "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" || true

      - name: Create archive
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/
          cd dist
          tar -czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Generate checksums
        shell: bash
        run: |
          find artifacts -type f -name '*.tar.gz' -print | LC_ALL=C sort | while IFS= read -r archive; do
            checksum=$(sha256sum "$archive" | cut -d ' ' -f 1)
            printf '%s  %s\n' "$checksum" "$(basename "$archive")"
          done > SHA256SUMS
          test -s SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            SHA256SUMS
