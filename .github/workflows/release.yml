---
name: Release

"on":
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          cache: false
          rustflags: ""
      - name: Verify signed annotated tag and Cargo version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "guard") | .version')
          test "$RELEASE_TAG" = "v${version}" || {
            echo "release tag does not match Cargo package version v${version}"
            exit 1
          }
          tag_ref=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}")
          test "$(jq -r '.object.type' <<< "$tag_ref")" = tag || {
            echo "release ref is not an annotated tag"
            exit 1
          }
          tag_sha=$(jq -r '.object.sha' <<< "$tag_ref")
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.verification.verified')" = true || {
            echo "release tag signature is not verified"
            exit 1
          }
      - name: Run tests
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: guard
            asset_name: guard-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: guard
            asset_name: guard-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: guard.exe
            asset_name: guard-${{ github.ref_name }}-x86_64-pc-windows-msvc.tar.gz
          # - target: x86_64-apple-darwin
          #   os: macos-latest
          #   artifact_name: guard
          #   asset_name: guard-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          # - target: aarch64-apple-darwin
          #   os: macos-latest
          #   artifact_name: guard
          #   asset_name: guard-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          target: ${{ matrix.target }}
          cache: false
          rustflags: ""

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build binary (Native)
        if: "!matrix.use_cross"
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$BUILD_TARGET"

      - name: Build binary (Cross)
        if: matrix.use_cross
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cross build --release --target "$BUILD_TARGET"

      - name: Strip binary
        if: matrix.target != 'x86_64-pc-windows-msvc'
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: strip "target/${BUILD_TARGET}/release/${ARTIFACT_NAME}"

      - name: Create archive
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          mkdir -p dist
          cp "target/${BUILD_TARGET}/release/${ARTIFACT_NAME}" dist/
          cd dist
          tar -czf "$ASSET_NAME" "$ARTIFACT_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Publishes release assets and release notes.
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Generate checksums
        shell: bash
        run: |
          find artifacts -type f -name '*.tar.gz' -print | LC_ALL=C sort | while IFS= read -r archive; do
            checksum=$(sha256sum "$archive" | cut -d ' ' -f 1)
            printf '%s  %s\n' "$checksum" "$(basename "$archive")"
          done > SHA256SUMS
          test -s SHA256SUMS

      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mapfile -d '' archives < <(find artifacts -type f -name '*.tar.gz' -print0)
          test "${#archives[@]}" -gt 0
          if release_state=$(gh release view "$RELEASE_TAG" --json isDraft 2>/dev/null); then
            if ! jq -e '.isDraft' <<< "$release_state" >/dev/null; then
              echo "published release already exists for ${RELEASE_TAG}"
              exit 1
            fi
            gh release upload "$RELEASE_TAG" --clobber "${archives[@]}" SHA256SUMS
            gh release edit "$RELEASE_TAG" --draft=false
          else
            gh release create "$RELEASE_TAG" \
              --generate-notes \
              --verify-tag \
              "${archives[@]}" \
              SHA256SUMS
          fi
