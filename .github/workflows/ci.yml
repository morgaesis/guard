---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Test release integrity logic
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "guard") | .version')
          verify_tag() { test "$1" = "v${version}"; }
          verify_tag "v${version}"
          if verify_tag "v0.0.0"; then
            echo "mismatched release tag was accepted"
            exit 1
          fi
          mkdir -p /tmp/guard-release-test/a /tmp/guard-release-test/b
          printf one > /tmp/guard-release-test/a/one.tar.gz
          printf two > /tmp/guard-release-test/b/two.tar.gz
          find /tmp/guard-release-test -type f -name '*.tar.gz' -print | LC_ALL=C sort | while IFS= read -r archive; do
            checksum=$(sha256sum "$archive" | cut -d ' ' -f 1)
            printf '%s  %s\n' "$checksum" "$(basename "$archive")"
          done > /tmp/guard-release-test/SHA256SUMS
          test -s /tmp/guard-release-test/SHA256SUMS
          mkdir /tmp/guard-release-test/verify
          cp /tmp/guard-release-test/a/*.tar.gz /tmp/guard-release-test/b/*.tar.gz /tmp/guard-release-test/verify/
          cp /tmp/guard-release-test/SHA256SUMS /tmp/guard-release-test/verify/
          (cd /tmp/guard-release-test/verify && sha256sum --check SHA256SUMS)
          rm -rf /tmp/guard-release-test

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          components: clippy, rustfmt
          cache: false
          rustflags: ""

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: test
          cache-workspace-crates: true
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: User-facing style check
        shell: bash
        run: |
          em_dash=$(printf '\342\200\224')
          if git grep -n "$em_dash"; then
            echo "Em dash characters are not permitted in repository content."
            exit 1
          fi

      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  # Branch protection requires a status check literally named "Test & Lint".
  # The matrix job above reports as "Test & Lint (ubuntu-latest)" / "Test &
  # Lint (windows-latest)" instead, so that required context could never be
  # satisfied. This aggregator job produces the exact required name and fails
  # if any matrix leg did not succeed, so branch protection can require one
  # stable check regardless of how many OSes the matrix covers.
  test_and_lint:
    name: Test & Lint
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix result
        env:
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          if [ "$TEST_RESULT" != "success" ]; then
            echo "Test & Lint matrix did not succeed: $TEST_RESULT"
            exit 1
          fi

  build_dry_run:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: guard
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: guard
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: guard.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          target: ${{ matrix.target }}
          cache: false
          rustflags: ""

      - name: Identify build environment
        id: build-environment
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          GIT_SHA: ${{ github.sha }}
          WORKFLOW_HASH: ${{ hashFiles('.github/workflows/ci.yml') }}
        run: |
          rustc_commit=$(rustc -vV | awk '/^commit-hash:/ { print $2 }')
          runner_image="${ImageOS:-unknown}-${ImageVersion:-unknown}"
          printf 'cache_key=binary-v1-%s-%s-%s-%s-%s\n' \
            "$BUILD_TARGET" "$rustc_commit" "$runner_image" "$WORKFLOW_HASH" "$GIT_SHA" \
            >> "$GITHUB_OUTPUT"

      # build.rs embeds the Git commit in the executable. A binary is therefore
      # reusable only for an exact rerun with the same toolchain and runner image.
      - name: Restore exact binary
        id: binary-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          key: ${{ steps.build-environment.outputs.cache_key }}

      - name: Rust Cache
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-workspace-crates: true
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Build
        if: steps.binary-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$BUILD_TARGET"

      - name: Save exact binary
        if: >-
          steps.binary-cache.outputs.cache-hit != 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          key: ${{ steps.binary-cache.outputs.cache-primary-key }}

      - name: Verify binary
        shell: bash
        env:
          BINARY: target/${{ matrix.target }}/release/${{ matrix.binary }}
        run: '"$BINARY" --version'
