---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Test release integrity logic
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "guard") | .version')
          verify_tag() { test "$1" = "v${version}"; }
          verify_tag "v${version}"
          if verify_tag "v0.0.0"; then
            echo "mismatched release tag was accepted"
            exit 1
          fi
          mkdir -p /tmp/guard-release-test/a /tmp/guard-release-test/b
          printf one > /tmp/guard-release-test/a/one.tar.gz
          printf two > /tmp/guard-release-test/b/two.tar.gz
          find /tmp/guard-release-test -type f -name '*.tar.gz' -print | LC_ALL=C sort | while IFS= read -r archive; do
            checksum=$(sha256sum "$archive" | cut -d ' ' -f 1)
            printf '%s  %s\n' "$checksum" "$(basename "$archive")"
          done > /tmp/guard-release-test/SHA256SUMS
          test -s /tmp/guard-release-test/SHA256SUMS
          mkdir /tmp/guard-release-test/verify
          cp /tmp/guard-release-test/a/*.tar.gz /tmp/guard-release-test/b/*.tar.gz /tmp/guard-release-test/verify/
          cp /tmp/guard-release-test/SHA256SUMS /tmp/guard-release-test/verify/
          (cd /tmp/guard-release-test/verify && sha256sum --check SHA256SUMS)
          rm -rf /tmp/guard-release-test

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: User-facing style check
        shell: bash
        run: |
          if git grep -n $'\u2014'; then
            echo "Em dash characters are not permitted in repository content."
            exit 1
          fi

      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  # Branch protection requires a status check literally named "Test & Lint".
  # The matrix job above reports as "Test & Lint (ubuntu-latest)" / "Test &
  # Lint (windows-latest)" instead, so that required context could never be
  # satisfied. This aggregator job produces the exact required name and fails
  # if any matrix leg did not succeed, so branch protection can require one
  # stable check regardless of how many OSes the matrix covers.
  test_and_lint:
    name: Test & Lint
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test & Lint matrix did not succeed: ${{ needs.test.result }}"
            exit 1
          fi

  build_dry_run:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
