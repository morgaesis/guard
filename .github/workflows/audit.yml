name: Security & Dependency Audit

on:
  branch_protection_rule:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  cargo_audit:
    name: Security Audit (CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          cache: false
          rustflags: ""

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Run audit
        run: cargo audit

  cargo_deny:
    name: License & Dependency Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          cache: false
          rustflags: ""

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.20.2 --locked

      - name: Run cargo-deny
        run: cargo deny check advisories bans licenses sources

  cargo_outdated:
    name: Report Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          cache: false
          rustflags: ""

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --version 0.19.0 --locked

      - name: Report outdated dependencies
        run: |
          if ! cargo outdated --exit-code 1; then
            echo "::warning::Available dependency updates are listed above."
          fi

  cargo_machete:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          cache: false
          rustflags: ""

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Install cargo-machete
        run: cargo install cargo-machete --version 0.9.2 --locked

      - name: Check unused
        run: cargo machete

  # Fails when the live required-status-check set in the Protect main ruleset
  # drifts from the declared list in scripts/sync-ruleset.sh. A fine-grained
  # token with Administration: read-only permission makes the check
  # authoritative when the default GitHub token cannot read rulesets.
  ruleset_drift:
    name: Ruleset Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Compare live required checks with declared list
        env:
          GH_TOKEN: ${{ secrets.REQUIRED_CHECKS_TOKEN || github.token }}
          TOKEN_PROVIDED: ${{ secrets.REQUIRED_CHECKS_TOKEN != '' }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          scripts/sync-ruleset.sh --check
          status=$?
          set -e
          case "$status" in
            0) exit 0 ;;
            1)
              echo "::error::Required status checks in the Protect main ruleset drifted from the declared list; run scripts/sync-ruleset.sh --apply."
              exit 1
              ;;
            *)
              if [ "$TOKEN_PROVIDED" = "true" ]; then
                echo "::error::REQUIRED_CHECKS_TOKEN is set but the Protect main ruleset is unreadable; check the token's Administration: read permission."
                exit 1
              fi
              echo "::warning::The Protect main ruleset is unreadable with the default token; drift check skipped. Provision the REQUIRED_CHECKS_TOKEN secret (fine-grained PAT, Administration: read-only) to enforce it."
              exit 0
              ;;
          esac

  dependency_review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Uploads CodeQL SARIF to code scanning.
    strategy:
      fail-fast: false
      matrix:
        language: [actions, rust]
    steps:
      - name: Checkout without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1

  zizmor:
    name: GitHub Actions Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Uploads zizmor SARIF to code scanning.
    steps:
      - name: Checkout without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Analyze workflows with zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02  # v0.6.0
        with:
          version: 1.27.0

  ossf_scorecard:
    name: OSSF Scorecard
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Publishes the signed Scorecard result.
      security-events: write  # Uploads Scorecard SARIF to code scanning.
    steps:
      - name: Checkout without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload Scorecard results to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          sarif_file: results.sarif
