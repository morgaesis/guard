name: ClusterFuzzLite

# Corpus persistence uses a dedicated storage repository
# (github.com/morgaesis/guard-fuzz-corpus) written via the FUZZ_STORAGE_TOKEN
# secret (a PAT with write access to that repo). When the secret is absent,
# every job still runs from the checked-in seed corpora and emits a warning
# annotation instead of failing.

on:
  pull_request:
    branches: [main]
  schedule:
    # Daily batch fuzzing (grows and uploads the corpus).
    - cron: '17 2 * * *'
    # Weekly corpus pruning (minimizes the stored corpus).
    - cron: '17 4 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fuzz-pr:
    name: Fuzz changed code
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      STORAGE_REPO_URL: ${{ secrets.FUZZ_STORAGE_TOKEN && format('https://x-access-token:{0}@github.com/morgaesis/guard-fuzz-corpus.git', secrets.FUZZ_STORAGE_TOKEN) || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Warn when corpus persistence is unavailable
        if: env.STORAGE_REPO_URL == ''
        run: echo "::warning title=No fuzz corpus persistence::FUZZ_STORAGE_TOKEN is not set. Fuzzing runs from checked-in seed corpora only; no corpus growth or cross-run crash dedup. Create github.com/morgaesis/guard-fuzz-corpus and add a FUZZ_STORAGE_TOKEN secret with write access."

      - name: Build fuzz targets
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          github-token: ${{ github.token }}
          language: rust
          sanitizer: address

      - name: Run fuzz targets
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          fuzz-seconds: 180
          github-token: ${{ github.token }}
          mode: code-change
          output-sarif: true
          sanitizer: address
          storage-repo: ${{ env.STORAGE_REPO_URL }}
          storage-repo-branch: main
          storage-repo-branch-coverage: gh-pages

  fuzz-batch:
    name: Batch fuzzing
    if: (github.event_name == 'schedule' && github.event.schedule == '17 2 * * *') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      STORAGE_REPO_URL: ${{ secrets.FUZZ_STORAGE_TOKEN && format('https://x-access-token:{0}@github.com/morgaesis/guard-fuzz-corpus.git', secrets.FUZZ_STORAGE_TOKEN) || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Warn when corpus persistence is unavailable
        if: env.STORAGE_REPO_URL == ''
        run: echo "::warning title=No fuzz corpus persistence::FUZZ_STORAGE_TOKEN is not set. Batch fuzzing cannot upload its corpus, so coverage restarts from the seed corpora each run. Create github.com/morgaesis/guard-fuzz-corpus and add a FUZZ_STORAGE_TOKEN secret with write access."

      - name: Build fuzz targets
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          github-token: ${{ github.token }}
          language: rust
          sanitizer: address

      - name: Run fuzz targets
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          fuzz-seconds: 3600
          github-token: ${{ github.token }}
          mode: batch
          sanitizer: address
          storage-repo: ${{ env.STORAGE_REPO_URL }}
          storage-repo-branch: main
          storage-repo-branch-coverage: gh-pages

  fuzz-prune:
    name: Corpus pruning
    if: github.event_name == 'schedule' && github.event.schedule == '17 4 * * 0'
    runs-on: ubuntu-latest
    env:
      STORAGE_REPO_URL: ${{ secrets.FUZZ_STORAGE_TOKEN && format('https://x-access-token:{0}@github.com/morgaesis/guard-fuzz-corpus.git', secrets.FUZZ_STORAGE_TOKEN) || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Warn when corpus persistence is unavailable
        if: env.STORAGE_REPO_URL == ''
        run: echo "::warning title=No fuzz corpus persistence::FUZZ_STORAGE_TOKEN is not set. Pruning has no stored corpus to minimize. Create github.com/morgaesis/guard-fuzz-corpus and add a FUZZ_STORAGE_TOKEN secret with write access."

      - name: Build fuzz targets
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          github-token: ${{ github.token }}
          language: rust
          sanitizer: address

      - name: Prune corpus
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          fuzz-seconds: 600
          github-token: ${{ github.token }}
          mode: prune
          sanitizer: address
          storage-repo: ${{ env.STORAGE_REPO_URL }}
          storage-repo-branch: main
          storage-repo-branch-coverage: gh-pages
