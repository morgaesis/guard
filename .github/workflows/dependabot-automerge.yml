name: Dependabot review gate

# Gate Dependabot PRs that need human review while staying quiet for updates
# that normal CI can cover:
#
#   - patch and minor cargo updates
#   - all GitHub Actions updates (we already SHA-pin them, so the bump
#     is functionally a vetted-tag → vetted-tag move)
#
# Major and unclassified version bumps fail closed for human review. The gate
# does not execute pull request code, use external model credentials, post
# comments, approve reviews, or merge changes. Major security updates follow
# the same fail-closed policy because alert lookup requires a separate
# privileged token.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Dependabot pull request number to process"
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: dependabot-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review-gate:
    name: Classify dependency update
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # Reads Dependabot PR metadata and changed-file names.
    steps:
      - name: Resolve pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          pr_number="${DISPATCH_PR_NUMBER:-${EVENT_PR_NUMBER:-}}"
          if [ -z "$pr_number" ]; then
            echo "No pull request number was provided."
            exit 1
          fi

          author="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '.user.login')"
          if [ "$author" != "dependabot[bot]" ]; then
            echo "PR #${pr_number} was opened by ${author}, not dependabot[bot]."
            exit 1
          fi

          {
            echo "number=${pr_number}"
            echo "url=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '.html_url')"
            echo "head_sha=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '.head.sha')"
            echo "head_ref=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '.head.ref')"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve update metadata
        id: fetch_meta
        if: github.event_name == 'pull_request'
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Resolve dispatched update metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          FETCH_UPDATE_TYPE: ${{ steps.fetch_meta.outputs.update-type }}
          FETCH_PACKAGE_ECOSYSTEM: ${{ steps.fetch_meta.outputs.package-ecosystem }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -euo pipefail

          update_type="$FETCH_UPDATE_TYPE"
          package_ecosystem="$FETCH_PACKAGE_ECOSYSTEM"

          if [ -z "$update_type" ]; then
            body="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.body // ""')"
            update_type="$(printf '%s\n' "$body" | sed -n 's/^[[:space:]]*-[[:space:]]*update-type:[[:space:]]*//p' | head -1)"
          fi
          if [ -z "$update_type" ]; then
            case "$HEAD_REF" in
              *major*) update_type="version-update:semver-major" ;;
              *minor*) update_type="version-update:semver-minor" ;;
              *patch*) update_type="version-update:semver-patch" ;;
            esac
          fi

          if [ -z "$package_ecosystem" ]; then
            files="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')"
            if printf '%s\n' "$files" | grep -Eq '^\.github/workflows/'; then
              package_ecosystem="github_actions"
            elif printf '%s\n' "$files" | grep -Eq '(^|/)Cargo\.(toml|lock)$'; then
              package_ecosystem="cargo"
            else
              package_ecosystem="unknown"
            fi
          fi

          {
            echo "update-type=${update_type}"
            echo "package-ecosystem=${package_ecosystem}"
          } >> "$GITHUB_OUTPUT"

      - name: Enforce review policy
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          PACKAGE_ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
        run: |
          set -euo pipefail

          case "$UPDATE_TYPE" in
            version-update:semver-patch|version-update:semver-minor)
              echo "Routine update; normal CI is sufficient."
              exit 0
              ;;
          esac

          if [ "$PACKAGE_ECOSYSTEM" = "github_actions" ]; then
            echo "SHA-pinned GitHub Actions update; normal CI is sufficient."
            exit 0
          fi

          echo "Major or unclassified dependency update requires human review."
          exit 1
