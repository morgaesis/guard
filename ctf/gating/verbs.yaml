# Deterministic verb catalog for the consequence-gating adversarial harness.
# All verbs are `trusted` (skip the LLM) so the control-plane attacks run
# offline and deterministically. Each operates on files under /work so effects
# (and the exec identity that produced them) are observable.
verbs:
  - name: read-file
    description: Read a file under /work (reversible)
    binary: cat
    args: ["{path}"]
    params:
      path: { pattern: "^/work/[a-z0-9._/-]+$", required: true }
    consequence: reversible
    trusted: true

  - name: stage-file
    description: Create a file under /work; auto-reverts (removes it) unless confirmed
    binary: touch
    args: ["{path}"]
    params:
      path: { pattern: "^/work/[a-z0-9._/-]+$", required: true }
    consequence: recoverable
    revert: { binary: rm, args: ["-f", "{path}"] }
    trusted: true

  - name: wipe
    description: Recursively delete a path under /work (irreversible; held)
    binary: rm
    args: ["-rf", "{path}"]
    params:
      path: { pattern: "^/work/[a-z0-9._/-]+$", required: true }
    consequence: irreversible
    trusted: true

  - name: ssh-safe-host
    description: Exercise transparent ssh shim without caller SSH_AUTH_SOCK
    binary: ssh
    args: ["safe-host"]
    consequence: reversible
    trusted: true

  - name: kubectl-version
    description: Exercise transparent kubectl shim
    binary: kubectl
    args: ["version", "--client"]
    consequence: reversible
    trusted: true

  - name: helm-checked-upgrade
    description: Exercise a typed Helm command with cooperative dry-run/diff/target limits
    binary: helm
    args: ["upgrade", "--install", "demo", "./chart", "--namespace", "staging", "--dry-run", "--diff"]
    consequence: reversible
    trusted: true

  - name: ansible-ping-check
    description: Exercise a typed Ansible command with check mode
    binary: ansible
    args: ["web", "-m", "ping", "--check"]
    consequence: reversible
    trusted: true

  - name: ansible-ping-all-cwd
    description: Exercise Ansible inventory discovery from the caller cwd under a valid session
    binary: ansible
    args: ["-m", "ping", "all"]
    consequence: reversible
    trusted: true

  - name: ansible-playbook-check-diff
    description: Exercise an opaque playbook carrier only with check/diff/limit controls
    binary: ansible-playbook
    args: ["site.yml", "--check", "--diff", "--limit", "web"]
    consequence: reversible
    trusted: true
